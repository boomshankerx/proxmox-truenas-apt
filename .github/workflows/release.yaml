
name: Release

on:
  # Source repo should send:
  #   repository_dispatch with type: release-published
  #   and client_payload: { "tag_name": "v1.2.3" }
  repository_dispatch:
    types: [release-published]
  # Manual fallback
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to use (e.g., v1.2.3). Leave blank to use 'latest'."
        required: false
        type: string

env:
  TARGET_NAME: 'proxmox-truenas'
  TARGET_REPO: 'boomshankerx/proxmox-truenas'
  REPO_NAME: 'proxmox-truenas'
  COMPONENTS: main
  ARCHES: amd64 i386 arm64
  REPO_URL: https://boomshankerx.github.io/proxmox-truenas-apt

jobs:
  build_release:
    name: Build .deb package
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload assets to the release

    outputs:
      tag: ${{ steps.version.outputs.TAG }}
      version: ${{ steps.version.outputs.FULL_VERSION }}

    steps:
      - name: Install build tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg dpkg-dev fakeroot

      - name: Checkout (APT repo)
        uses: actions/checkout@v5

      - name: Checkout (source repo)
        uses: actions/checkout@v5
        with:
          repository: boomshankerx/proxmox-truenas
          path: source

      - name: Derive version from tag
        id: version
        run: |
          set -euo pipefail
          TAG="${{ github.event.client_payload.tag_name || github.event.inputs.tag_name }}"
          if [ -z "${TAG}" ]; then
            echo "This workflow must be triggered by a published release or given a tag_name input."
            exit 1
          fi
          FULL_VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "FULL_VERSION=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "FULL_VERSION=${FULL_VERSION}" >> "$GITHUB_ENV"
          echo "Tag: ${TAG}"
          echo "Version: ${FULL_VERSION}"

      - name: Fix maintainer script permissions (best-effort)
        run: |
          set -euo pipefail
          for pkg in legacy native; do
            test -d "$pkg/DEBIAN" || continue
            test -f "$pkg/DEBIAN/postinst" && chmod 0755 "$pkg/DEBIAN/postinst" || true
            test -f "$pkg/DEBIAN/postrm"  && chmod 0755 "$pkg/DEBIAN/postrm"  || true
            test -f "$pkg/DEBIAN/preinst" && chmod 0755 "$pkg/DEBIAN/preinst" || true
            test -f "$pkg/DEBIAN/prerm"  && chmod 0755 "$pkg/DEBIAN/prerm"  || true
          done  

      - name: Update DEBIAN/control with version
        run: |
          set -euo pipefail
          for pkg in legacy native; do
            test -d "$pkg/DEBIAN" || continue
            test -f "$pkg/DEBIAN/control" || (echo "Missing $pkg/DEBIAN/control" >&2; exit 1)
            tmpfile=$(mktemp)
            sed "s/^Version:.*/Version: ${FULL_VERSION}/" $pkg/DEBIAN/control > "$tmpfile"
            mv "$tmpfile" $pkg/DEBIAN/control
            test -f $pkg/DEBIAN/control
          done

      - name: Build legacy .deb package
        run: |
          set -euo pipefail
          mkdir -p legacy
          dpkg-deb --build --root-owner-group legacy "${TARGET_NAME}_${FULL_VERSION}_all.deb"
          dpkg-deb --info "${TARGET_NAME}_${FULL_VERSION}_all.deb"
          dpkg-deb --contents "${TARGET_NAME}_${FULL_VERSION}_all.deb" | head -n 20

      - name: Build native .deb package
        run: |
          set -euo pipefail
          mkdir -p native/usr/share/perl5/PVE/Storage/Custom
          cp -r source/perl5/PVE/Storage/Custom/TrueNASPlugin.pm native/usr/share/perl5/PVE/Storage/Custom/TrueNASPlugin.pm
          mkdir -p native/usr/share/perl5/TrueNAS
          cp -r source/perl5/TrueNAS/* native/usr/share/perl5/TrueNAS/
          dpkg-deb --build --root-owner-group native "${TARGET_NAME}-native_${FULL_VERSION}_all.deb"
          dpkg-deb --info "${TARGET_NAME}-native_${FULL_VERSION}_all.deb"
          dpkg-deb --contents "${TARGET_NAME}-native_${FULL_VERSION}_all.deb" | head -n 20

      - name: Upload .deb to the tagged release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ steps.version.outputs.TAG }}" \
            "${TARGET_NAME}_${FULL_VERSION}_all.deb" \
            --repo "${{ env.TARGET_REPO }}" \
            --clobber
          gh release upload "${{ steps.version.outputs.TAG }}" \
            "${TARGET_NAME}-native_${FULL_VERSION}_all.deb" \
            --repo "${{ env.TARGET_REPO }}" \
            --clobber

  apt_repo:
    name: Build & Publish APT repo (bookworm + trixie)
    needs: build_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout (APT repo)
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install reprepro
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro

      - name: Download .deb from tagged release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "${{ needs.build_release.outputs.tag }}" \
            --repo "${{ env.TARGET_REPO }}" \
            --pattern "*.deb" \
            --dir artifacts
          ls -l artifacts
      - name: Import GPG signing key
        run: |
          set -euo pipefail
          echo "${{ secrets.SIGNING_KEY }}" | gpg --batch --import
          # Trust the imported key ultimately
          GPG_KEY_FP=$(gpg --list-secret-keys --with-colons 2>/dev/null \
            | awk -F: '/^fpr:/ {print $10; exit}')
          echo "${GPG_KEY_FP}:6:" | gpg --import-ownertrust

          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null \
            | grep '^sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"
          echo "Imported signing key: \`${GPG_KEY_ID}\`" >> "$GITHUB_STEP_SUMMARY"
      
      - name: Build APT repo
        run: |
          set -euo pipefail

          REPO_BASE="repo"
          mkdir -p "${REPO_BASE}/conf"

          # Generate reprepro distributions config for each codename
          for CODENAME in bookworm trixie; do
            cat >> "${REPO_BASE}/conf/distributions" <<EOF
          Origin: ${REPO_NAME}
          Label: ${REPO_NAME}
          Suite: ${CODENAME}
          Codename: ${CODENAME}
          Components: ${COMPONENTS}
          Architectures: ${ARCHES} source
          SignWith: ${GPG_KEY_ID}
          Description: ${REPO_NAME} APT repository

          EOF
          done

          cat "${REPO_BASE}/conf/distributions"

          # Include each .deb into each codename
          for CODENAME in bookworm trixie; do
            for deb in artifacts/*.deb; do
              echo "Including $(basename "$deb") into ${CODENAME}..."
              reprepro -b "${REPO_BASE}" -C "${COMPONENTS}" includedeb "${CODENAME}" "$deb"
            done
          done

          # Show what ended up in the repo
          echo "### APT repo contents" >> "$GITHUB_STEP_SUMMARY"
          for CODENAME in bookworm trixie; do
            echo "#### ${CODENAME}" >> "$GITHUB_STEP_SUMMARY"
            reprepro -b "${REPO_BASE}" list "${CODENAME}" | while IFS= read -r line; do
              echo "- \`${line}\`" >> "$GITHUB_STEP_SUMMARY"
            done
          done
      - name: Export public key
        run: |
          gpg --armor --export "${GPG_KEY_ID}" > repo/public.key
 
      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site
 
          # Copy reprepro output (dists/ and pool/)
          cp -r repo/dists site/
          cp -r repo/pool site/
          cp repo/public.key site/
 
          # Copy static assets (index.html, gpg.key, .nojekyll, etc.)
          [ -d static ] && cp -r static/* site/ || true
 
          echo "### Site contents" >> "$GITHUB_STEP_SUMMARY"
          find site -type f | sort | while IFS= read -r f; do
            echo "- \`${f}\`" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
